<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Nap Recliners — Quotation Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --red:#c0392b;--red-dark:#922b21;--red-light:#f9ebea;
  --ink:#1c1c1c;--soft:#888;--border:#ddd;--bg:#f0f0f0;--radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1c1c1c;color:white;padding:10px 22px;border-radius:24px;font-size:.82rem;
  opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);
  display:none;align-items:center;justify-content:center;z-index:998;}
.loading-overlay.show{display:flex;}
.loading-box{background:white;padding:28px 36px;border-radius:12px;text-align:center;min-width:220px;}
.spinner{width:38px;height:38px;border:3px solid #eee;border-top-color:var(--red);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

.app-header{background:var(--ink);color:white;padding:12px 28px;display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.header-logo{height:36px;object-fit:contain;}
.header-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;}
.header-sub{font-size:.72rem;color:#aaa;letter-spacing:.05em;text-transform:uppercase;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.sheet-status{font-size:.75rem;padding:5px 12px;border-radius:20px;font-weight:600;}
.sheet-status.connected{background:#d4edda;color:#1a6b31;}
.sheet-status.disconnected{background:#fdecea;color:var(--red);}
.sheet-status.loading{background:#fff3cd;color:#856404;}
.refresh-btn{background:none;border:1px solid rgba(255,255,255,.3);color:white;
  padding:5px 12px;border-radius:6px;font-size:.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
.refresh-btn:hover{background:rgba(255,255,255,.1);}

.app-body{display:grid;grid-template-columns:490px 1fr;min-height:calc(100vh - 56px);}

.form-panel{background:white;border-right:1px solid var(--border);
  overflow-y:auto;height:calc(100vh - 56px);position:sticky;top:56px;}
.form-section{padding:18px 22px;border-bottom:1px solid #f0f0f0;}
.section-title{font-family:'Playfair Display',serif;font-size:.92rem;font-weight:600;
  color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';display:block;width:3px;height:15px;background:var(--red);border-radius:2px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-grid.single{grid-template-columns:1fr;}
.form-grid.triple{grid-template-columns:1fr 1fr 1fr;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--soft);}
.field input,.field textarea,.field select{
  border:1.5px solid var(--border);border-radius:6px;padding:7px 10px;
  font-family:'DM Sans',sans-serif;font-size:.84rem;color:var(--ink);
  background:#fafafa;transition:border-color .2s;width:100%;}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--red);background:white;}
.field textarea{resize:vertical;min-height:65px;}
.field select{cursor:pointer;}

.line-items-container{display:flex;flex-direction:column;gap:12px;}
.item-card{border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;background:#fafafa;border-left:3px solid var(--red);}
.card-header{background:var(--red-light);padding:8px 12px;display:flex;align-items:center;
  justify-content:space-between;font-size:.78rem;font-weight:600;color:var(--ink);
  text-transform:uppercase;letter-spacing:.04em;}
.card-body{padding:12px;display:flex;flex-direction:column;gap:9px;}
.remove-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:4px;}
.remove-btn:hover{background:#fdecea;}
.add-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;
  border:1.5px solid var(--red);border-radius:6px;background:none;
  font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;color:var(--red);cursor:pointer;}
.add-btn:hover{background:var(--red-light);}
.calc-display{background:white;border:1px solid #eee;border-radius:6px;padding:6px 10px;font-size:.8rem;color:var(--soft);}
.calc-display span{color:var(--ink);font-weight:600;}

/* Image area in product card */
.img-area{display:flex;flex-direction:column;gap:5px;align-items:center;}
.product-thumb{width:64px;height:52px;object-fit:cover;border-radius:4px;border:1px solid var(--border);display:block;}
.thumb-placeholder{width:64px;height:52px;border-radius:4px;border:1px dashed var(--border);
  display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--soft);text-align:center;}
.img-upload-btn{font-size:.65rem;color:var(--red);cursor:pointer;text-align:center;
  text-decoration:underline;padding:2px;background:none;border:none;font-family:'DM Sans',sans-serif;}
.img-upload-btn:hover{color:var(--red-dark);}
.img-clear-btn{font-size:.65rem;color:var(--soft);cursor:pointer;text-align:center;
  background:none;border:none;font-family:'DM Sans',sans-serif;}
.img-clear-btn:hover{color:var(--ink);}

.action-bar{padding:14px 22px;border-top:1px solid var(--border);
  position:sticky;bottom:0;background:white;z-index:10;display:flex;gap:10px;}
.generate-btn{flex:1;padding:12px;background:var(--red);color:white;border:none;
  border-radius:8px;font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;cursor:pointer;}
.generate-btn:hover{background:var(--red-dark);}
.clear-btn{padding:12px 16px;background:none;border:1.5px solid var(--border);
  border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;color:var(--soft);cursor:pointer;}
.clear-btn:hover{border-color:var(--ink);color:var(--ink);}

.preview-panel{background:#e8e8e8;padding:22px;overflow-y:auto;}
.preview-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.preview-toolbar h2{font-family:'Playfair Display',serif;font-size:1rem;color:var(--ink);margin-right:auto;}
.pdf-btn{display:flex;align-items:center;gap:6px;padding:9px 18px;background:var(--red);color:white;
  border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;
  box-shadow:0 2px 8px rgba(192,57,43,.3);}
.pdf-btn:hover{background:var(--red-dark);}
.pdf-btn:disabled{opacity:.5;cursor:not-allowed;}
.print-btn{display:flex;align-items:center;gap:6px;padding:9px 18px;background:white;color:var(--ink);
  border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;}
.print-btn:hover{border-color:var(--ink);}

/* ── QUOTATION DOCUMENT STYLES ─────────────────────────────────────────────── */
/* These match the dark/professional look of the original example */
#quotation-preview{background:white;width:100%;max-width:860px;margin:0 auto;
  box-shadow:0 4px 40px rgba(0,0,0,.15);font-family:'DM Sans',sans-serif;font-size:11px;color:#111;}
.q-page{padding:32px 36px;}
.q-header{text-align:center;margin-bottom:16px;padding-bottom:14px;border-bottom:3px solid #1a1a2e;}
.q-logo{max-height:100px;max-width:300px;object-fit:contain;display:block;margin:0 auto 6px;}
.q-plant-addr{font-size:9px;color:#555;line-height:1.6;margin-top:4px;}
.q-doc-title{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
  color:#1a1a2e;margin-top:10px;padding:5px 0;border-top:1px solid #ddd;}
.q-info-block{display:grid;grid-template-columns:1fr 1fr;border:1.5px solid #1a1a2e;margin-bottom:14px;}
.q-info-col{padding:10px 12px;}
.q-info-col:first-child{border-right:1.5px solid #1a1a2e;}
.col-title{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:#888;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #eee;}
.q-info-row{display:flex;gap:6px;margin-bottom:3px;font-size:10px;line-height:1.4;}
.q-info-label{color:#666;min-width:82px;flex-shrink:0;}
.q-info-value{color:#111;font-weight:500;}
.q-customer-name{font-size:12px;font-weight:700;color:#1a1a2e;margin-bottom:5px;}
.q-table-wrapper{border:1.5px solid #1a1a2e;border-bottom:none;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.q-table{width:100%;min-width:520px;border-collapse:collapse;font-size:10px;}
.q-table th{background:#dedcdc;color:#1c1c1c;padding:7px 8px;text-align:left;
  font-size:8.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.q-table th:nth-child(3),.q-table th:nth-child(4),.q-table th:nth-child(5),
.q-table th:nth-child(6),.q-table th:nth-child(7){text-align:right;}
.q-table td{padding:8px;border-bottom:1px solid #e8e2d9;vertical-align:top;}
.q-table tr:nth-child(even) td{background:#faf8f5;}
.q-table td:nth-child(3),.q-table td:nth-child(4),.q-table td:nth-child(5),
.q-table td:nth-child(6),.q-table td:nth-child(7){text-align:right;}
.q-model-name{font-weight:700;font-size:11px;color:#1a1a2e;margin-bottom:3px;}
.q-category-tag{display:inline-block;font-size:8px;background:#e8e8e8;color:#555;
  border-radius:3px;padding:1px 5px;margin-bottom:3px;font-weight:600;}
.q-desc-specs{color:#555;font-size:9px;line-height:1.7;}
.q-item-img{width:70px;height:58px;object-fit:cover;border-radius:3px;border:1px solid #ddd;display:block;margin-top:5px;}
.q-img-placeholder{width:70px;height:58px;background:#f0ece4;border:1px dashed #ccc;border-radius:3px;
  display:flex;align-items:center;justify-content:center;font-size:8px;color:#999;margin-top:5px;}
.q-totals-block{border:1.5px solid #1a1a2e;}
.q-total-table{width:100%;border-collapse:collapse;}
.q-total-table td{padding:6px 12px;font-size:10.5px;border-bottom:1px solid #e0dbd2;}
.q-total-table tr:last-child td{border-bottom:none;}
.q-total-table .label-cell{color:#555;width:70%;}
.q-total-table .value-cell{text-align:right;font-weight:600;color:#111;}
.q-total-table .grand-row td{background:#dedcdc;color:#1c1c1c;font-weight:700;font-size:12px;padding:9px 12px;}
.q-total-table .words-row td{background:#f5eddb;color:#1a1a2e;font-weight:600;font-size:10px;font-style:italic;padding:7px 12px;}
.q-total-table .subtotal-row td{background:#faf8f5;}
.q-footer-note{margin-top:12px;font-size:8.5px;color:#888;font-style:italic;text-align:center;padding:6px 0;border-top:1px solid #e8e2d9;}
.q-terms{margin-top:12px;padding:12px;background:#faf8f5;border:1px solid #e8e2d9;border-radius:4px;}
.q-terms-title{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;color:#1a1a2e;}
.q-terms ol{padding-left:16px;}
.q-terms li{margin-bottom:3px;font-size:9px;color:#444;line-height:1.5;}
.q-bottom{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
.q-banking,.q-reg-addr{padding:10px 12px;border:1px solid #e8e2d9;border-radius:4px;background:#faf8f5;}
.q-section-heading{font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.07em;
  color:#1a1a2e;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #e0dbd2;}
.q-banking-row,.q-addr-line{font-size:9px;color:#555;line-height:1.7;}
.q-banking-row strong{color:#111;}
.q-sign-area{margin-top:16px;display:flex;justify-content:flex-end;}
.q-sign-box{text-align:center;}
.q-sign-line{width:160px;border-top:1px solid #aaa;margin:28px auto 4px;}
.q-sign-label{font-size:9px;color:#777;}

.error-banner{background:#fdecea;border:1px solid #f5c6c6;border-radius:6px;
  padding:10px 14px;margin:12px 22px 0;font-size:.8rem;color:#922b21;display:none;}
.error-banner.show{display:block;}
.success-banner{background:#d4edda;border:1px solid #b8dacc;border-radius:6px;
  padding:10px 14px;margin:12px 22px 0;font-size:.8rem;color:#1a6b31;display:none;}
.success-banner.show{display:block;}
.preview-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;color:#aaa;gap:10px;}
.preview-empty .big-icon{font-size:3rem;}
.preview-empty p{font-size:.88rem;}

@media print{
  body *{visibility:hidden;}
  #quotation-preview,#quotation-preview *{visibility:visible;}
  #quotation-preview{position:fixed;left:0;top:0;width:100%;box-shadow:none;}
}
@media(max-width:900px){
  .app-body{grid-template-columns:1fr;}
  .form-panel{position:static;height:auto;}
  .preview-panel{padding:10px;}
  .q-table-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .q-table{min-width:520px;}
  #quotation-preview{font-size:9px;}
}

.q-words-row{
  background:#f5eddb;color:#1a1a2e;font-weight:600;font-size:10px;
  font-style:italic;padding:8px 12px;border-top:1px solid #e8e2d9;
}
.q-totals-block{border:1.5px solid #1a1a2e;overflow:hidden;}

</style>
</head>
<body>

<div id="toast"></div>
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <p style="font-family:'DM Sans',sans-serif;font-size:.88rem;color:#666;margin-top:4px" id="loading-msg">Loading…</p>
  </div>
</div>

<div class="app-header">
  <img class="header-logo" src="/logo.jpg" alt="Little Nap Recliners">
  <div>
    <div class="header-title">Little Nap Recliners</div>
    <div class="header-sub">Quotation Generator</div>
  </div>
  <div class="header-right">
    <div class="sheet-status loading" id="sheet-status-badge">● Loading…</div>
    <button class="refresh-btn" onclick="loadProducts()">↻ Refresh</button>
  </div>
</div>

<div class="app-body">
  <div class="form-panel">
    <div class="error-banner"   id="error-banner"></div>
    <div class="success-banner" id="success-banner"></div>

    <!-- Customer Details -->
    <div class="form-section">
      <div class="section-title">Customer Details</div>
      <div class="form-grid single">
        <div class="field"><label>Customer / Company Name *</label>
          <input type="text" id="cust-name" placeholder="e.g. Prestige Estates Ltd." oninput="autoPreview()"></div>
      </div>
      <div class="form-grid single" style="margin-top:10px">
        <div class="field"><label>Address</label>
          <textarea id="cust-addr" rows="2" placeholder="Full address" oninput="autoPreview()"></textarea></div>
      </div>
      <div class="form-grid" style="margin-top:10px">
        <div class="field"><label>GSTIN</label>
          <input type="text" id="cust-gstin" placeholder="27AAAAA0000A1Z5" oninput="autoPreview()"></div>
        <div class="field"><label>Contact Person</label>
          <input type="text" id="cust-contact" placeholder="Name" oninput="autoPreview()"></div>
      </div>
      <div class="form-grid" style="margin-top:10px">
        <div class="field"><label>Mobile Number</label>
          <input type="text" id="cust-mobile" placeholder="+91 98765 43210" oninput="autoPreview()"></div>
        <div class="field"><label>Email Address</label>
          <input type="email" id="cust-email" placeholder="customer@example.com" oninput="autoPreview()"></div>
      </div>
    </div>

    <!-- Little Nap Details -->
    <div class="form-section">
      <div class="section-title">Little Nap Details</div>
      <div class="form-grid">
        <div class="field"><label>OPF NUMBER</label>
          <input type="text" id="quot-num" placeholder="LND/MM/YY-YY/" oninput="autoPreview()"></div>
        <div class="field"><label>Date</label>
          <input type="date" id="quot-date" oninput="autoPreview()"></div>
      </div>
      <div class="form-grid" style="margin-top:10px">
        <div class="field"><label>Little Nap GSTIN</label>
          <input type="text" id="ln-gstin" value="" oninput="autoPreview()"></div>
        <div class="field"><label>Contact Person (Sales Person)</label>
          <input type="text" id="ln-contact" value="" oninput="autoPreview()"></div>
      </div>
      <div class="form-grid" style="margin-top:10px">
        <div class="field"><label>Contact Number</label>
          <input type="text" id="ln-phone" placeholder="+91 XXXXX XXXXX" oninput="autoPreview()"></div>
        <div class="field"><label>Email</label>
          <input type="email" id="ln-email" placeholder="xxxx@littlenap.in" oninput="autoPreview()"></div>
      </div>
    </div>

    <!-- Product Line -->
    <div class="form-section">
      <div class="section-title">Product Line</div>
      <div class="line-items-container" id="product-items"></div>
      <div style="margin-top:10px">
        <button class="add-btn" onclick="addProductItem()">＋ Add Product</button>
      </div>
    </div>

    <!-- Freight -->
    <div class="form-section">
      <div class="section-title">Freight</div>
      <div class="form-grid">
        <div class="field"><label>Freight Amount (Rs.)</label>
          <input type="number" id="freight-amt" value="0" oninput="autoPreview()"></div>
        <div class="field"><label>Destination City</label>
          <input type="text" id="freight-dest" placeholder="e.g. Mumbai" oninput="autoPreview()"></div>
      </div>
    </div>

    <!-- Terms -->
    <div class="form-section">
      <div class="section-title">Terms &amp; Conditions</div>
      <div class="field">
        <textarea id="terms" rows="8" oninput="autoPreview()">Delivery: 4–5 weeks from the date of confirmation of order.
Payment: 50% advance and balance 50% before dispatch of goods from our premises.
Warranty: Five year warranty on mechanism and two years on motor.
One plug point (5 Amp) for each motor is required (in case of Motorized Recliners).
We use best quality of mechanism & Motor.
Once order placed cannot be changed after 2 working days or 40% of the total amount will be charged as manufacturing loss.
Unloading in Scope of client.
All legal disputes will be subject to Delhi jurisdiction.</textarea>
      </div>
    </div>

    <!-- Bank Details -->
    <div class="form-section">
      <div class="section-title">Bank Details</div>
      <div class="field">
        <label>Select Bank Account</label>
        <select id="bank-select" onchange="onBankSelect(this.value)">
          <option value="">Loading bank accounts…</option>
        </select>
      </div>
      <div id="bank-details-display" style="margin-top:10px;padding:10px;background:#fafafa;border:1px solid #e8e2d9;border-radius:6px;font-size:.82rem;color:#555;display:none">
        <div id="bank-info-lines" style="line-height:1.8"></div>
      </div>
    </div>

    <div class="action-bar">
      <button class="clear-btn" onclick="clearForm()">Clear</button>
      <button class="generate-btn" onclick="generateAndSave()">Generate &amp; Save →</button>
    </div>
  </div>

  <!-- PREVIEW PANEL -->
  <div class="preview-panel">
    <div class="preview-toolbar">
      <h2>📄 Quotation Preview</h2>
      <button class="print-btn" onclick="window.print()">🖨 Print</button>
      <button class="pdf-btn" id="pdf-btn" onclick="downloadPDF()">⬇ Download PDF</button>
    </div>
    <div id="preview-container">
      <div class="preview-empty">
        <div class="big-icon">🛋️</div>
        <p>Fill in the form and click <strong>Generate &amp; Save</strong></p>
        <p style="font-size:.76rem">Preview updates as you type</p>
      </div>
    </div>
  </div>
</div>

<!-- Hidden file input for manual image upload -->

const CHAIR_CATEGORIES = ['Eco Range Recliners', 'Living Room Recliners', 'Home Theatre Recliners', 'Recliner Sofa'];

let productDB    = [];   // [{category,model,price,image}]

// ── UTILS ─────────────────────────────────────────────────────────────────────
function v(id)  { return document.getElementById(id)?.value?.trim()||''; }
function h(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n) {
  n = Number(n);
  if(isNaN(n)) return '0';
  const neg = n < 0;
  const [intPart, decPart] = Math.abs(n).toFixed(2).split('.');
  const s = intPart;
  let r = s.length<=3 ? s : (() => {
    const last3=s.slice(-3), rest=s.slice(0,-3), groups=[];
    for(let i=rest.length;i>0;i-=2) groups.unshift(rest.slice(Math.max(0,i-2),i));
    return groups.join(',')+','+last3;
  })();
  // Only show decimals if non-zero
  const dec = decPart && decPart !== '00' ? '.'+decPart : '';
  return (neg?'-':'')+r+dec;
}

function toast(msg,ms=2800){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),ms);}
function showError(msg){const el=document.getElementById('error-banner');if(msg){el.textContent='⚠ '+msg;el.classList.add('show');}else el.classList.remove('show');}
function showSuccess(msg){const el=document.getElementById('success-banner');el.innerHTML=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),8000);}
function showLoading(msg){document.getElementById('loading-msg').textContent=msg||'Loading…';document.getElementById('loading-overlay').classList.add('show');}
function hideLoading(){document.getElementById('loading-overlay').classList.remove('show');}

function isChairCategory(cat){ return CHAIR_CATEGORIES.includes(cat); }

// ── DATA HELPERS ──────────────────────────────────────────────────────────────
function getCategories(){ return [...new Set(productDB.map(p=>p.category))].filter(Boolean).sort(); }
function getModels(cat)  { return productDB.filter(p=>p.category===cat); }
function getCustomModels(type){ return productDB.filter(p=>p.category===type); }
function lookup(cat,model){ return productDB.find(p=>p.category===cat&&p.model===model)||null; }

// ── LOAD PRODUCTS ─────────────────────────────────────────────────────────────
async function loadProducts(){
  const badge=document.getElementById('sheet-status-badge');
  badge.className='sheet-status loading'; badge.textContent='● Loading…';
  try{
    const res=await fetch('/api/products'); const data=await res.json();
    if(!res.ok) throw new Error(data.error||'Error '+res.status);
    productDB=data;
    badge.className='sheet-status connected'; badge.textContent=`● ${productDB.length} products`;
    renderProductForms(); showError(null);
  }catch(err){
    badge.className='sheet-status disconnected'; badge.textContent='● Not connected';
    showError('Could not load products: '+err.message);
  }
}

// ── LOAD BANKS ────────────────────────────────────────────────────────────────
async function loadBanks(){
  try{
    const res=await fetch('/api/banks'); const data=await res.json();
    if(!res.ok) throw new Error(data.error||'Error '+res.status);
    banksDB=Array.isArray(data)?data:[];
    renderBankDropdown();
  }catch(err){
    console.warn('[loadBanks]',err.message);
    banksDB=[{label:'Punjab National Bank',name:'Punjab National Bank',account:'01444011000328',ifsc:'PUNB0014410',branch:'South Extension, New Delhi'}];
    renderBankDropdown();
  }
}
function renderBankDropdown(){
  const sel=document.getElementById('bank-select'); if(!sel) return;
  sel.innerHTML=banksDB.length
    ?['<option value="">Select bank account…</option>',...banksDB.map((b,i)=>`<option value="${i}">${h(b.label||b.name)}</option>`)].join('')
    :'<option value="">No bank accounts found</option>';
  if(banksDB.length===1){sel.value='0';onBankSelect('0');}
}
function onBankSelect(idx){
  if(idx===''||idx===null){selectedBank={};return;}
  const b=banksDB[parseInt(idx)]; if(!b) return;
  selectedBank={name:b.name||b.label,account:b.account,ifsc:b.ifsc,branch:b.branch};
  const display=document.getElementById('bank-details-display');
  const lines=document.getElementById('bank-info-lines');
  if(display&&lines){
    lines.innerHTML=`<span style="color:#888;font-size:.75rem">Bank:</span> <strong>${h(selectedBank.name)}</strong><br><span style="color:#888;font-size:.75rem">A/c No:</span> <strong>${h(selectedBank.account)}</strong><br><span style="color:#888;font-size:.75rem">IFSC:</span> <strong>${h(selectedBank.ifsc)}</strong><br><span style="color:#888;font-size:.75rem">Branch:</span> <strong>${h(selectedBank.branch)}</strong>`;
    display.style.display='block';
  }
  autoPreview();
}

// ── PRODUCT ITEMS ─────────────────────────────────────────────────────────────
function addProductItem(){
  const id=++itemIdCounter;
  productItems.push({id,category:'',model:'',units:1,unitPrice:0,discount:0,
    seat:'',arm:'',depth:'',height:'',upholstery:'',color:'',features:'',
    imageURL:'',customImageB64:null,customizations:[]});
  renderProductForms(); autoPreview();
}
function removeProductItem(id){
  productItems=productItems.filter(p=>p.id!==id);
  renderProductForms(); autoPreview();
}

function addCustomization(itemId){
  const item=productItems.find(p=>p.id===itemId); if(!item) return;
  item.customizations.push({id:++customIdCounter,type:'',model:'',unitPrice:0,discount:0});
  renderProductForms(); autoPreview();
}
function removeCustomization(itemId,custId){
  const item=productItems.find(p=>p.id===itemId); if(!item) return;
  item.customizations=item.customizations.filter(c=>c.id!==custId);
  renderProductForms(); autoPreview();
}

function renderProductForms(){
  const container=document.getElementById('product-items');
  container.innerHTML='';
  const cats=getCategories();
  productItems.forEach((item,idx)=>{
    const sp=item.unitPrice*(1-item.discount/100);

function onCustomTypeChange(itemId,custId,type){
  const item=productItems.find(p=>p.id===itemId); if(!item) return;
  const cust=item.customizations.find(c=>c.id===custId); if(!cust) return;
  cust.type=type; cust.model=''; cust.unitPrice=0;
  renderProductForms(); autoPreview();
}
function onCustomModelChange(itemId,custId,modelName){
  const item=productItems.find(p=>p.id===itemId); if(!item) return;
  const cust=item.customizations.find(c=>c.id===custId); if(!cust) return;
  const prod=lookup(cust.type,modelName);
  if(prod){cust.model=prod.model;cust.unitPrice=prod.price;}
  else{cust.model=modelName;}
  renderProductForms(); autoPreview();
}
function updateCustomField(itemId,custId,field,val){
  const item=productItems.find(p=>p.id===itemId); if(!item) return;
  const cust=item.customizations.find(c=>c.id===custId); if(!cust) return;
  if(['unitPrice','discount'].includes(field)) cust[field]=parseFloat(val)||0;
  else cust[field]=val;
  renderProductForms(); autoPreview();
}

function openImageUpload(itemId){currentUploadItemId=itemId;document.getElementById('img-file-input').value='';document.getElementById('img-file-input').click();}
function handleImageUpload(input){
  const file=input.files[0]; if(!file||currentUploadItemId===null) return;

}
function clearCustomImage(itemId){const item=productItems.find(p=>p.id===itemId);if(!item)return;item.customImageB64=null;renderProductForms();autoPreview();}
function onCategoryChange(id,cat){const item=productItems.find(p=>p.id===id);if(!item)return;item.category=cat;item.model='';item.unitPrice=0;item.imageURL='';item.customImageB64=null;item.customizations=[];renderProductForms();autoPreview();}
function onModelChange(id,modelName){const item=productItems.find(p=>p.id===id);if(!item||!modelName)return;const prod=lookup(item.category,modelName);if(prod){item.model=prod.model;item.unitPrice=prod.price;item.imageURL=prod.image;}else{item.model=modelName;}item.customImageB64=null;renderProductForms();autoPreview();}
function updateItemField(id,field,val){const item=productItems.find(p=>p.id===id);if(!item)return;if(['units','unitPrice','discount'].includes(field))item[field]=parseFloat(val)||0;else item[field]=val;if(['units','unitPrice','discount'].includes(field))renderProductForms();autoPreview();}

// ── CALCULATIONS ──────────────────────────────────────────────────────────────
function calcItemTotal(item){
  let total=item.unitPrice*(1-item.discount/100)*item.units;
  item.customizations.forEach(c=>{total+=c.unitPrice*(1-c.discount/100);});
  return total;
}
function calcTotals(){
  let sub=0; productItems.forEach(c=>{sub+=calcItemTotal(c);});
  const freight=parseFloat(document.getElementById('freight-amt').value)||0;
  return {subtotal:sub,freight,grandTotal:Math.ceil(sub+freight)};
}
function amountToWords(n){
  n=Math.round(n); if(!n) return 'Zero Only';
  const o=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const t=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function w(x){if(!x)return '';if(x<20)return o[x]+' ';if(x<100)return t[Math.floor(x/10)]+(x%10?' '+o[x%10]:'')+' ';return o[Math.floor(x/100)]+' Hundred '+w(x%100);}
  let r=''; const cr=Math.floor(n/1e7);n%=1e7; const la=Math.floor(n/1e5);n%=1e5; const th=Math.floor(n/1e3);n%=1e3;
  if(cr)r+=w(cr)+'Crore '; if(la)r+=w(la)+'Lakh'+(la>1?'s':'')+' '; if(th)r+=w(th)+'Thousand '; if(n)r+=w(n);
  return r.trim()+' Only';
}

// ── PDF GENERATION ────────────────────────────────────────────────────────────
async function buildPDFDoc(){
  const {jsPDF}=window.jspdf;
  const custName=v('cust-name'),custAddr=v('cust-addr'),custGST=v('cust-gstin');
  const custContact=v('cust-contact'),custMobile=v('cust-mobile'),custEmail=v('cust-email');
  const quotNum=v('quot-num'),quotDate=v('quot-date');
  const lnGST=v('ln-gstin'),lnContact=v('ln-contact'),lnPhone=v('ln-phone'),lnEmail=v('ln-email');
  const freightDest=v('freight-dest'),termsText=v('terms');
  const {subtotal,freight,grandTotal}=calcTotals();
  const fmtDate=quotDate?new Date(quotDate).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
  const freightDesc=`From Manesar to ${freightDest||'[Destination]'} incl. 18% GST`;
  const terms=termsText.split('\n').filter(l=>l.trim());

  showLoading('Fetching images…');
  const imageCache={};
  await Promise.all(productItems.map(async item=>{
    if(item.customImageB64){imageCache[item.id]=item.customImageB64;return;}
    if(!item.imageURL) return;
    try{const r=await fetch('/api/image-proxy?url='+encodeURIComponent(item.imageURL));if(r.ok){const d=await r.json();imageCache[item.id]=d.dataUrl;}}catch(e){}
  }));
  showLoading('Building PDF…');

  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const PW=210,PH=297,ML=12,MR=12,MT=12; const CW=PW-ML-MR;
  let y=MT;
  const NAVY=[26,26,46],DARK=[44,44,44],MID=[90,90,90],LIGHT=[140,140,140],PALE=[245,237,219],OFFWHITE=[250,248,245], GREY=[222, 220, 220];

  function addImg(b64,x,yy,w,hh){try{pdf.addImage(b64,b64.includes('image/png')?'PNG':'JPEG',x,yy,w,hh);}catch(e){}}
  function tx(text,x,yy,opts={}){
    pdf.setFontSize(opts.sz||9);pdf.setFont('helvetica',opts.st||'normal');pdf.setTextColor(...(opts.c||DARK));
    const lines=opts.mw?pdf.splitTextToSize(String(text||''),opts.mw):[String(text||'')];
    pdf.text(lines,x,yy,{align:opts.al||'left'});
    return lines.length*((opts.sz||9)*0.42);
  }
  function ln(x1,y1,x2,y2,c=DARK,lw=0.3){pdf.setDrawColor(...c);pdf.setLineWidth(lw);pdf.line(x1,y1,x2,y2);}
  function fillRect(x,yy,w,hh,c){pdf.setFillColor(...c);pdf.rect(x,yy,w,hh,'F');}
  function strokeRect(x,yy,w,hh,c,lw=0.4){pdf.setDrawColor(...c);pdf.setLineWidth(lw);pdf.rect(x,yy,w,hh,'S');}
  let tableActive=false; // declared before checkPage
  function checkPage(need){
  if(y+need>PH-14){
    pdf.addPage(); y=MT;
    if(tableActive) drawTableHeader(); // only draw header if mid-table
    }
  }
  // ── HEADER ────────────────────────────────────────────────────────────────
  const LOGO_ASPECT=1.0; // 1280x1280 square
  const LOGO_MAX_H=22, logoH=LOGO_MAX_H, logoW=LOGO_MAX_H*LOGO_ASPECT;
  addImg(LOGO_B64, ML+(CW-logoW)/2, y, logoW, logoH); y+=logoH+2;
  pdf.setFontSize(7.5);pdf.setFont('helvetica','normal');pdf.setTextColor(...LIGHT);
  pdf.text('Plant:  Plot No. 140, Sector 4, Imt Manesar, Gurugram, Haryana 122051',ML+CW/2,y,{align:'center'});y+=3.8;
  pdf.text('Ph: +91-88828-00600  |  www.littlenap.in  |  enquiry@littlenap.in',ML+CW/2,y,{align:'center'});y+=5;
  ln(ML,y,ML+CW,y,NAVY,.4);y+=5;
  tx('PROFORMA INVOICE',ML+CW/2,y,{sz:13,st:'bold',c:NAVY,al:'center'});y+=3;
  ln(ML,y,ML+CW,y,[200,200,200],0.3);y+=5;

  // ── INFO BLOCK ────────────────────────────────────────────────────────────
  const infoH=38,halfW=CW/2-1;
  pdf.setDrawColor(...NAVY);pdf.setLineWidth(0.2);
  pdf.rect(ML,y,halfW,infoH,'S'); pdf.rect(ML+halfW+2,y,halfW,infoH,'S');
  tx('BILL TO',ML+2,y+4,{sz:7,st:'bold',c:MID});
  ln(ML+2,y+5.5,ML+halfW-2,y+5.5,[200,200,200],0.2);
  tx(custName||'Customer',ML+2,y+10,{sz:10,st:'bold',c:NAVY});
  let ly=y+15;
  if(custAddr){pdf.setFontSize(7.5);pdf.setFont('helvetica','normal');pdf.setTextColor(...MID);const ww=pdf.splitTextToSize(custAddr,halfW-4);pdf.text(ww,ML+2,ly);ly+=ww.length*3.2;}
  if(custGST){tx('GSTIN: '+custGST,ML+2,ly,{sz:7.5,c:MID});ly+=3.2;}
  if(custContact){tx('Contact: '+custContact,ML+2,ly,{sz:7.5,c:MID});ly+=3.2;}
  if(custMobile){tx('Mobile: '+custMobile,ML+2,ly,{sz:7.5,c:MID});ly+=3.2;}
  if(custEmail){tx('Email: '+custEmail,ML+2,ly,{sz:7.5,c:MID});}
  const rx=ML+halfW+4;
  tx('LITTLE NAP DETAILS',rx,y+4,{sz:7,st:'bold',c:MID});
  ln(rx,y+5.5,ML+CW-2,y+5.5,[200,200,200],0.2);
  let ry=y+9;
  [[lnGST,'GSTIN'],[lnContact,'Contact'],[lnPhone,'Phone'],[lnEmail,'Email']].forEach(([val,lbl])=>{if(val){tx(lbl+': '+val,rx,ry,{sz:7.5,c:MID});ry+=3.2;}});
  ry+=1;ln(rx,ry,ML+CW-2,ry,[200,200,200],0.2);ry+=2.5;
  tx('OPF No.: '+quotNum,rx,ry,{sz:7.5,st:'bold',c:NAVY});ry+=3.5;
  tx('Date: '+fmtDate,rx,ry,{sz:7.5,c:MID});
  y+=infoH+4;

  // ── TABLE ─────────────────────────────────────────────────────────────────
  // Widen description, fix alignment — all numeric cols center-aligned
  // ₹ in header only; no Rs. prefix in cell values
  const imgW=16,imgH=13;
  const descW=65; // widest col
  const numW=Math.floor((CW-9-descW)/5); // 5 numeric cols share remainder
  const lastW=CW-9-descW-(numW*4);
  const cols=[
    {label:'S.No.',  w:9,    al:'center'},
    {label:'Description', w:descW, al:'left'},
    {label:'Units',  w:numW, al:'center'},
    {label:'Unit Price',  w:numW, al:'center'},
    {label:'Disc.%', w:numW, al:'center'},
    {label:'Spl. Price', w:numW, al:'center'},
    {label:'Total (Rs.)',       w:lastW, al:'center'}
  ];

  function drawTableHeader(){
    fillRect(ML,y,CW,7,GREY);
    let cx=ML;
    cols.forEach(col=>{
      const tx_x=col.al==='center'?cx+col.w/2:cx+1.5;
      pdf.setFontSize(6.5);pdf.setFont('helvetica','bold');pdf.setTextColor(28,28,28);
      pdf.text(col.label,tx_x,y+4.8,{align:col.al});
      cx+=col.w;
    });
    y+=8;
  }
  drawTableHeader();
  tableActive=true;

  let rowIdx=0;
  productItems.forEach((item)=>{
    const sp=item.unitPrice*(1-item.discount/100),lt=sp*item.units;
    const isChair=isChairCategory(item.category);
    const specs=isChair?[item.seat?`Seat: ${item.seat}`:'',item.arm?`Arm: ${item.arm}`:'',
      item.depth?`Depth: ${item.depth}`:'',item.height?`Height: ${item.height}`:'',
      item.upholstery?`Upholstery: ${item.upholstery}`:'',item.color?`Color: ${item.color}`:'',
      item.features||''].filter(Boolean).join('  •  '):'';
    const hasImg=!!imageCache[item.id];
    const nameLine=(item.model||'Product'); // category intentionally excluded from PDF
    // CRITICAL: splitTextToSize with exact column width - 2mm padding
    const descLines=pdf.setFontSize(8.5)&&pdf.splitTextToSize(nameLine, cols[1].w-3);
    const specLines=specs?pdf.setFontSize(7)&&pdf.splitTextToSize(specs, cols[1].w-3):[];
    const textH=(descLines.length*3.8)+(specLines.length*2.8)+(hasImg?imgH+2:0)+5;
    // Add height for customizations
    const custH=isChair?item.customizations.reduce((acc,c)=>{
      const cl=pdf.setFontSize(7.5)&&pdf.splitTextToSize(`  -> ${c.type}${c.model?' - '+c.model:''}`,cols[1].w-5);
      return acc+(Array.isArray(cl)?cl.length:1)*3.5+2;
    },0):0;
    const rowH=Math.max(textH+custH,12);

    checkPage(rowH+2);
    if(rowIdx%2===1) fillRect(ML,y,CW,rowH,OFFWHITE);
    ln(ML,y+rowH,ML+CW,y+rowH,[224,218,210],0.2);
    let sepx=ML+cols[0].w;
    for(let i=0;i<cols.length-1;i++){ln(sepx,y,sepx,y+rowH,[224,218,210],0.15);sepx+=cols[i+1].w;}

    let cx=ML;
    // S.No.
    pdf.setFontSize(8);pdf.setFont('helvetica','bold');pdf.setTextColor(...DARK);
    pdf.text(String(rowIdx+1),cx+cols[0].w/2,y+5,{align:'center'});
    cx+=cols[0].w;
    // Description — text wraps strictly within col width
    const descX=cx; // save desc column X before any cx increment
    const descMaxW=cols[1].w-3; // max text width with padding
    let dy=y+4;
    pdf.setFontSize(8.5);pdf.setFont('helvetica','bold');pdf.setTextColor(...NAVY);
    pdf.text(descLines,descX+1,dy);dy+=descLines.length*3.8;
    if(specLines.length){pdf.setFontSize(7);pdf.setFont('helvetica','normal');pdf.setTextColor(...LIGHT);pdf.text(specLines,descX+1,dy);dy+=specLines.length*2.8;}
    
    // Customizations — strictly within description col, no overflow
    if(isChair) item.customizations.forEach(cust=>{
      const cLine=`  -> ${cust.type}${cust.model?' - '+cust.model:''}`;
      const cLines=pdf.setFontSize(7.5)&&pdf.splitTextToSize(cLine, descMaxW);
      pdf.setFontSize(7.5);pdf.setFont('helvetica','italic');pdf.setTextColor(...MID);
      pdf.text(Array.isArray(cLines)?cLines:[cLines], descX+1, dy);
      dy+=(Array.isArray(cLines)?cLines.length:1)*3.5;
    if(hasImg) addImg(imageCache[item.id],descX+1,dy+1,imgW,imgH); dy+=hasImg?imgH+2:0;
    });
    cx+=cols[1].w;
    // Numeric cols — center aligned, no Rs. prefix (₹ is in header)
    const discStr=item.discount>0?item.discount+'%':'—';
    const vals=[String(item.units),fmt(item.unitPrice),discStr,fmt(sp),fmt(lt)];
    [2,3,4,5,6].forEach((ci,i)=>{
      pdf.setFontSize(8);pdf.setFont('helvetica','normal');pdf.setTextColor(...DARK);
      pdf.text(vals[i],cx+cols[ci].w/2,y+5,{align:'center'});
      // Customization price rows for this column (only price cols)
      if(isChair && i>=1 && i!==2){ // skip units and disc for customizations
        let cy=y+5+3.5;
        item.customizations.forEach(cust=>{
          const csp=cust.unitPrice*(1-cust.discount/100);
          let cv='—';
          if(i===1) cv=cust.unitPrice>0?fmt(cust.unitPrice):'—';
          else if(i===2) cv=cust.discount>0?cust.discount+'%':'—';
          else if(i===3) cv=cust.unitPrice>0?fmt(csp):'—';
          else if(i===4) cv=cust.unitPrice>0?fmt(csp):'—';
          pdf.setFontSize(7.5);pdf.setTextColor(...MID);
          pdf.text(cv,cx+cols[ci].w/2,cy,{align:'center'});
          cy+=3.5;
        });
      }
      cx+=cols[ci].w;
    });
    y+=rowH;
    rowIdx++;
  });
  ln(ML,y,ML+CW,y,NAVY,0.2);
  tableActive=false;

  // ── TOTALS ─────────────────────────────────────────────────────────────────
  const NORMAL_RH = 7;   // normal row height
  const GRAND_RH  = 8;   // grand total row
  const WORDS_RH  = 10;  // amount in words row
  const TOTALS_H  = 4*NORMAL_RH + GRAND_RH + WORDS_RH; // exact: 28+8+10 = 46
  checkPage(TOTALS_H+6);

  const totalRows=[
    {lbl:'Subtotal',          val:'Rs.'+fmt(subtotal),        grand:false, words:false},
    {lbl:'GST / Tax',         val:'Included',                  grand:false, words:false},
    {lbl:'Freight  ('+freightDesc+')', val:'Rs.'+fmt(freight), grand:false, words:false},
    {lbl:'Total',             val:'Rs.'+fmt(subtotal+freight), grand:false, words:false},
    {lbl:'Grand Total (rounded to next integer)', val:'Rs.'+fmt(grandTotal), grand:true,  words:false},
    {lbl:'Amount in Words: '+amountToWords(grandTotal), val:'',             grand:false, words:true}
  ];

  // Step 1: Fill colored rows first (no border yet)
  let ty=y;
  totalRows.forEach(({grand,words})=>{
    const rh=words?WORDS_RH:grand?GRAND_RH:NORMAL_RH;
    if(grand)  fillRect(ML,ty,CW,rh,GREY);
    else if(words) fillRect(ML,ty,CW,rh,PALE);
    ty+=rh;
  });

  // Step 2: Draw all divider lines between rows
  ty=y;
  totalRows.forEach(({grand,words},idx)=>{
    const rh=words?WORDS_RH:grand?GRAND_RH:NORMAL_RH;
    if(idx<totalRows.length-1 && !grand){
      ln(ML, ty+rh, ML+CW, ty+rh, [220,215,205], 0.2);
    }
    ty+=rh;
  });

  // Step 3: Draw text
  ty=y;
  totalRows.forEach(({lbl,val,grand,words})=>{
    const rh=words?WORDS_RH:grand?GRAND_RH:NORMAL_RH;
    const mid_y = ty + rh*0.62; // vertical center baseline
    if(grand){
      tx(lbl, ML+3, mid_y, {sz:9, st:'bold', c:[28,28,28]});
      tx(val, ML+CW-3, mid_y, {sz:9, st:'bold', c:[28,28,28], al:'right'});
    } else if(words){
      tx(lbl, ML+4, mid_y, {sz:8, st:'italic', c:NAVY, mw:CW-8});
    } else {
      tx(lbl, ML+3, mid_y, {sz:8, c:DARK, mw:CW-55});
      tx(val, ML+CW-3, mid_y, {sz:8, st:'bold', al:'right', c:DARK});
    }
    ty+=rh;
  });

  // Step 4: Draw outer NAVY border LAST so it always appears on top of fills
  pdf.setDrawColor(...NAVY); pdf.setLineWidth(0.2);
  pdf.rect(ML, y, CW, TOTALS_H, 'S');
  y = y + TOTALS_H;

  y += 4;

  // ── FOOTER ────────────────────────────────────────────────────────────────
  checkPage(8);ln(ML,y,ML+CW,y,[210,210,210],0.2);y+=3;
  tx('*** All images are for reference only. Actual appearance, colour and dimensions may vary. ***',ML+CW/2,y,{sz:7,c:LIGHT,al:'center'});y+=7;

  // ── TERMS ─────────────────────────────────────────────────────────────────
  // T&C header on its own background, then terms start BELOW (not overlapping)
  const tcHeaderH=7;
  checkPage(tcHeaderH+terms.length*4.5+4);
  fillRect(ML,y,CW,tcHeaderH,OFFWHITE);
  strokeRect(ML,y,CW,tcHeaderH,[200,200,200],0.3);
  tx('TERMS & CONDITIONS',ML+3,y+4.8,{sz:8,st:'bold',c:NAVY});
  y+=tcHeaderH; // move PAST the header before writing terms
  terms.forEach((t,i)=>{
    checkPage(5.5);
    const lines=pdf.setFontSize(7.5)&&pdf.splitTextToSize(`${i+1}.  ${t}`,CW-6);
    pdf.setFontSize(7.5);pdf.setFont('helvetica','normal');pdf.setTextColor(...MID);
    pdf.text(lines,ML+3,y+3.5);
    y+=(Array.isArray(lines)?lines.length:1)*4.2+0.5;
  });
  y+=3;

  // ── BANK + ADDRESS ────────────────────────────────────────────────────────
  checkPage(30);
  const hb=CW/2-1;
  pdf.setDrawColor(200,200,200);pdf.setLineWidth(0.3);
  pdf.rect(ML,y,hb,24,'S');pdf.rect(ML+hb+2,y,hb,24,'S');
  tx('BANK DETAILS',ML+2,y+4.5,{sz:7,st:'bold',c:NAVY});
  ln(ML+2,y+6,ML+hb-2,y+6,[210,210,210],0.2);
  let by=y+9;
  [[selectedBank.name||'—','Bank'],[selectedBank.account||'—','A/c No'],[selectedBank.ifsc||'—','IFSC'],[selectedBank.branch||'—','Branch']].forEach(([val,lbl])=>{
    tx(lbl+': ',ML+2,by,{sz:7,c:LIGHT});tx(val,ML+20,by,{sz:7,st:'bold',c:DARK});by+=3.6;
  });
  const ax=ML+hb+4;
  tx('REGISTERED ADDRESS',ax,y+4.5,{sz:7,st:'bold',c:NAVY});
  ln(ax,y+6,ML+CW-2,y+6,[210,210,210],0.2);
  tx('Little Nap Designs Pvt. Ltd. ',ax,y+9,{sz:7,c:DARK});
  tx('1st Floor, Shop number: 23, Khanpur Extn.',ax,y+12.8,{sz:7,c:MID});
  tx('M.B. Road, New Delhi \u2014 110062',ax,y+16.6,{sz:7,c:MID});
  y+=28;

  // ── SIGNATURE ─────────────────────────────────────────────────────────────
  checkPage(18);y+=4;
  const sx=ML+CW-62;
  ln(sx,y+12,ML+CW,y+12,[170,170,170],0.4);
  tx('Authorised Signatory \u2014 Little Nap Recliners',sx,y+16,{sz:7,c:LIGHT});

  return pdf;
}

// ── GENERATE & SAVE ───────────────────────────────────────────────────────────
async function generateAndSave(){
  if(!v('cust-name')){toast('⚠ Please enter a customer name first.');return;}
  const btn=document.querySelector('.generate-btn'); btn.disabled=true;
  try{
    renderPreview();
    const pdf=await buildPDFDoc();
    const cn=v('cust-name'), dt=v('quot-date')||new Date().toISOString().split('T')[0];
    const quotNum=v('quot-num'), lnContact=v('ln-contact');
    const fileName=`Quotation_${cn}_${dt}.pdf`;
    const pdfBase64=pdf.output('datauristring').split(',')[1];
    showLoading('Saving to Google Drive…');
    const saveRes=await fetch('/api/save-quotation',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pdfBase64,fileName,salesPerson:lnContact,opfNumber:quotNum,
        date:new Date(dt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})})});
    const saveData=await saveRes.json();
    if(!saveRes.ok) throw new Error(saveData.error||'Save failed');
    pdf.save(fileName);
    showSuccess(`✓ Saved! &nbsp;<a href="${saveData.driveLink}" target="_blank" style="color:#1a6b31;font-weight:600">View on Google Drive ↗</a>`);
    toast('✓ Saved to Drive & downloaded');
  }catch(e){
    console.error('[generateAndSave]',e);
    toast('⚠ Drive save failed: '+e.message+' — downloading locally.');
    try{const pdf2=await buildPDFDoc();pdf2.save(`Quotation_${v('cust-name')||'Customer'}_${v('quot-date')||'today'}.pdf`);}catch(e2){}
  }finally{btn.disabled=false;hideLoading();}
}
async function downloadPDF(){
  const btn=document.getElementById('pdf-btn'); btn.disabled=true;
  try{renderPreview();const pdf=await buildPDFDoc();pdf.save(`Quotation_${v('cust-name')||'Customer'}_${v('quot-date')||'today'}.pdf`);toast('✓ PDF downloaded');}
  catch(e){console.error(e);toast('PDF failed: '+e.message);}
  finally{btn.disabled=false;hideLoading();}
}
</script>
